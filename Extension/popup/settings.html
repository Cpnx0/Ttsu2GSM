<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="rounded-2">
    <div class="card" style="width: 400px;">
    <div class="card-body form-switch form-check p-0">
        <div class="accordion accordion-flush" id="accordion">
  <div class="accordion-item">
    <h2 class="accordion-header">
      <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapseOne" aria-expanded="true" aria-controls="collapseOne">
        settings
      </button>
    </h2>
    <div id="collapseOne" class="accordion-collapse collapse show" data-bs-parent="#accordion">
      <div class="accordion-body">
        <div class="row">
            <label for="activeCheckbox" class="text-capitalize form-label">turn on/off the extension</label>
            <input type="checkbox" name="activeCheckbox" id="activeCheckbox" role="switch" class="form-check-input h5">
        </div>
        
        <div class="row mt-3">
            <label for="hideCheckbox" class="text-capitalize form-label">hide checkboxes</label>
            <input type="checkbox" name="hideCheckbox" id="hideCheckbox" role="switch" class="form-check-input h5">
        </div>

        <div class="row mt-3">
            <label for="clipboardCheckbox" class="form-label text-capitalize">Use clipboard (disable websocket)</label>
            <input type="checkbox" role="switch" name="clipboardCheckbox" id="clipboardCheckbox" class="form-check-input h5">
        </div>

        <div class="row mt-3">
            <label for="websocketCheckbox" class="form-label text-capitalize">Use websocket</label>
            <input type="checkbox" role="switch" name="websocketCheckbox" id="websocketCheckbox" class="form-check-input h5">
        </div>

        <div class="row mt-3 justify-content-center">
            <label for="websocket" class="text-center text-capitalize">websocket port</label>
            <input type="text" name="websocket" id="websocket" class="form-control form-text text-center w-75">
        </div>
      </div>
    </div>
  </div>
  <div class="accordion-item">
    <h2 class="accordion-header">
      <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseTwo" aria-expanded="false" aria-controls="collapseTwo">
        Export
      </button>
    </h2>
    <div id="collapseTwo" class="accordion-collapse collapse" data-bs-parent="#accordion">
      <div class="accordion-body">
        <div class="row justify-content-center">
            <label for="export" class="text-center text-capitalize form-label">Date Range (Optinal)</label>
            <div class="col-6">
                <label class="text-capitalize form-label" for="startDate">start date</label>
                <input type="date" name="startDate" id="startDate" class="form-control">
            </div>
            <div class="col-6 mb-2">
                <label for="endDate" class="text-capitalize form-label">end date</label>
                <input type="date" name="endDate" id="endDate" class="form-control">
            </div>
            <label for="importCheckbox" class="form-label">import to GSM</label>
            <input type="checkbox" role="switch" name="importCheckbox" id="importCheckbox" class="form-check-input h5 mt-2">
            <button id="export" name="export" class="btn btn-success text-capitalize text-center rounded">Export</button>
            <div class="d-flex justify-content-center mt-2">
              <div id="spinner" class="spinner-border" role="status" hidden>
                <span class="visually-hidden">Loading...</span>
              </div>
              <label id="exportSuccess" class="form-label text-success mt-1" for="export" hidden>Exported Successfully</label>
              <label id="exportFailed" class="form-label text-danger mt-1" for="export" hidden>Export Failed</label>
            </div>

            <a class="link-underline link-underline-opacity-0 text-capitalize text-center mt-2" href="http://localhost:7275/api/docs#/Import%2FExport/post_api_import_exstatic" target="_blank">import CSV file</a>
        </div>
      </div>
    </div>
  </div>
        </div>
        

    </div>
    </div>
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/settings.js"></script>
</body>
</html>
